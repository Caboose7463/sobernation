name: Weekly Vercel Rebuild

# Triggers a fresh Vercel deployment every Sunday at 2am UTC.
# This updates the Last-Modified header on all pages and the sitemap lastmod,
# signalling freshness to Google without any content changes needed.
#
# Setup required:
#   1. In Vercel: Project Settings → Git → Deploy Hooks → create hook named "weekly-rebuild"
#   2. In GitHub: Settings → Secrets → Actions → add VERCEL_DEPLOY_HOOK_URL = <the hook URL>

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  trigger-rebuild:
    name: Trigger Vercel deploy
    runs-on: ubuntu-latest

    steps:
      - name: Ping Vercel deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "Vercel responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Deploy hook returned $HTTP_STATUS (expected 201)"
            exit 1
          fi

      - name: Log result
        run: echo "✓ Vercel rebuild triggered at $(date -u '+%Y-%m-%d %H:%M UTC')"
